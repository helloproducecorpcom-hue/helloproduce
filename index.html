<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hello Produce Corp | Portal</title>
    <style>
        body { font-family: sans-serif; background: #fcfbf8; padding: 20px; }
        .card { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .admin-view { display: none; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="login">
    <h1>HPC Portal</h1>
    <input type="text" id="user" placeholder="Usuario (ej: ESQUINA MEXICANA)">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="check()">ENTRAR</button>
</div>

<div class="card admin-view" id="app">
    <h1>Catálogo HPC</h1>
    <div id="catalogContent"></div>
    <button onclick="order()">FINALIZAR PEDIDO</button>
</div>

<script>
    function check() {
        // Esto es un ejemplo, aquí es donde conectaríamos con la base de datos
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    function order() {
        const h = new Date().getHours();
        if (h < 24) {
            alert("Your order has priority and will be delivered in the early hours of the day.");
        } else {
            alert("We are processing your order; it will be delivered throughout the day.");
        }
    }
</script>
</body>
</html>
