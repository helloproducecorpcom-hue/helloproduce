<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HPC Pedidos</title>
    <style>
        body { font-family: sans-serif; background: #fdfaf0; color: #333; padding: 20px; }
        .hidden { display: none; }
        .producto { border-bottom: 1px solid #ccc; padding: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="user" placeholder="Nombre de usuario"><br>
        <input type="password" id="pass" placeholder="Contraseña"><br>
        <button onclick="login()">Entrar</button>
    </div>

    <!-- Pantalla de Catálogo -->
    <div id="app-screen" class="hidden">
        <h1>Catálogo Hello Produce Corp</h1>
        <div id="lista-productos"></div>
        <button onclick="enviarPedido()">Generar Pedido</button>
        <div id="admin-section" class="hidden">
            <h3>Panel Admin</h3>
            <button onclick="verConsolidado()">Ver Total Despachos</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
