<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPC - Panel de Acceso</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; text-transform: uppercase; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #c5c1b9; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .admin-panel { background: #1a1a1a; border: 1px solid #c5c1b9; padding: 20px; border-radius: 12px; margin-top: 30px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Produce Corp</h1>
        <p>Ingresa tu código de cliente o administrador</p>
        <form id="loginForm">
            <input type="text" id="clientCode" placeholder="CÓDIGO DE ACCESO" required>
            <button type="submit">INGRESAR</button>
        </form>
        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>Panel de Administración</h3>
            <input type="text" id="newName" placeholder="Nombre Restaurante">
            <input type="text" id="newAddr" placeholder="Dirección">
            <button onclick="addClient()">REGISTRAR CLIENTE</button>
            <ul id="clientList" style="font-size: 12px; margin-top: 20px;"></ul>
        </div>
    </div>

    <script>
        const admins = ["CYNTHIA", "VALENTINA"];
        let clients = {
            "ESQUINA-MEXICANA": "1361 Washington Ave, Miami Beach",
            "COYOTE-TACO": "1351 Collins Ave, Miami Beach",
            "RESTAURANTE-DON-SOMBRERO": "808 Collins Ave, Miami Beach",
            "MAMAS-TACOS": "710 Washington Ave #3, Miami Beach",
            "IL-BOLOGNESE": "1400 Ocean Drive LLC, Miami Beach",
            "HAVANA-BEACH-RESTAURANT": "740 Ocean Drive, Miami Beach",
            "ALMA-CUBANA": "650 Ocean Dr, Miami Beach",
            "LA-VENTANA-COLOMBIAN-RESTAURANT": "710 Washington Ave #2, Miami Beach",
            "ESQUINA-CUBANA": "710 Washington St, Miami Beach",
            "HAVANA-VIEJA": "944 Washington Ave, Miami Beach",
            "ATHENA-RESTAURANT": "560 Washington Ave, Miami Beach",
            "LA-MULATA": "1443 Washington Ave, Miami Beach",
            "OSTERIA-POSITANO": "1200 Collins Ave, Miami Beach",
            "LITTLE-HABANA": "1051 Collins Ave, Miami Beach"
        };

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('clientCode').value.toUpperCase().trim();
            if (admins.includes(code)) {
                document.getElementById('adminPanel').style.display = 'block';
                alert("Bienvenida Administradora");
            } else if (clients[code]) {
                window.location.href = 'catalogo.html';
            } else {
                alert("Código no reconocido");
            }
        });

        function addClient() {
            const name = document.getElementById('newName').value;
            const code = name.toUpperCase().replace(/\s+/g, '-');
            clients[code] = document.getElementById('newAddr').value;
            alert("Cliente agregado: " + code);
        }
    </script>
</body>
</html>
