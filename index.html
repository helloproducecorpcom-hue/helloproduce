<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hello Produce Corp</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1>Hello Produce Corp</h1>
        <div id="loginSection">
            <input type="text" id="pass" placeholder="Código de acceso">
            <button onclick="check()">INGRESAR</button>
        </div>
        <div id="adminPanel" style="display:none;">
            <h2>Panel de Administrador</h2>
            <p>Bienvenida, Valentina.</p>
        </div>
    </div>
    <script>
        function check() {
            const p = document.getElementById('pass').value;
            if (p === "VALENTINA" || p === "CYNTHIA") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("Código incorrecto");
            }
        }
    </script>
</body>
</html>
